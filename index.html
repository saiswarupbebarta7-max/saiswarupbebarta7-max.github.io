<!DOCTYPE html>
<html>
<head>
    <title>Nutrition Tracker</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h1>Daily Nutrition Tracker</h1>

<div class="container">

    <h2>Set Protein Goal</h2>

    <input type="number" id="goalInput" placeholder="Enter Protein Goal">

    <button onclick="setGoal()">Set Goal</button>

    <br>
    <br>

    <select id="mealType">
        <option value="Breakfast">Breakfast</option>
        <option value="Lunch">Lunch</option>
        <option value="Dinner">Dinner</option>
        <option value="Snacks">Snacks</option>
    </select>

    <h2>🍽 Add Meal</h2>
    
    <input type="text" id="food" placeholder="Enter food (e.g. Egg)">
    <input type="number" id="quantity" placeholder="Quantity">
    
    <button onclick="addMeal()">Add</button>

    <h2>Meals Today</h2>
    <ul id="mealList"></ul>

    <h2>📊 Today's Summary</h2>
    
    <p>Calories: <span id="calories">0</span> g</p>
    <p>Protein: <span id="protein">0</span> g</p>
    <p>Goal: <span id="goalProgress">0/120</span>g Protein</p>
    <p>Carbs: <span id="carbs">0</span> g</p>
    <p>Fats: <span id="fats">0</span> g</p>

    <h2>Rating</h2>
    <p id="rating">-</p>

    <h2>📅 Previous Days</h2>
    <ul id="historyList"></ul>

    <button onclick="resetDay()">Reset Day</button>

</div>

<script src="script.js"></script>

</body>
</html>
